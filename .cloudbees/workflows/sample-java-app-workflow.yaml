apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: sample-java-app-workflow

on:
  push:
    branches:
      - "**"

jobs:
  build:
    steps:

      - name: Checkout Code
        kind: build
        uses: docker://alpine/git:latest
        run: |
          git clone https://github.com/avinash1617/sample-java-app.git

      - name: Maven Build
        kind: build
        uses: docker://maven:3.9.14-eclipse-temurin-8
        run: |
          cd sample-java-app
          mvn clean package
          ls -ltra target

      - name: Generate SBOM
        kind: scan
        uses: docker://alpine:3.19
        run: |
          apk add --no-cache curl
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir:/cloudbees/workspace/sample-java-app -o cyclonedx-json > sbom.json
          pwd
          ls -ltra

      - name: Trivy Filesystem Scan
        kind: scan
        uses: docker://alpine:3.19
        run: |
          apk add --no-cache curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          ./bin/trivy fs /cloudbees/workspace/sample-java-app

      - name: Build Docker Image
        kind: build
        uses: docker://docker:24
        run: |
          cd sample-java-app
          docker build -t sample-java-app:latest .
          docker images

      - name: Trivy Container Image Scan
        kind: scan
        uses: docker://alpine:3.19
        run: |
          apk add --no-cache curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          ./bin/trivy image sample-java-app:latest
